<title>Consolidation Globale — Indicateurs de gestion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Cabin:wght@400;500;600;700&display=swap');

:root{
  --rep:#002F6C; --rep2:#1351A8; --rep-pale:#E6ECF8;
  --rouge:#B52020; --vert:#1A6B3C; --orange:#C05A00; --jaune:#8A6800;
  --gris1:#1E2D3D; --gris2:#4A5A6A; --gris3:#8A9BAA; --gris4:#EEF2F7;
  --blanc:#FFFFFF; --bord:#CDD6E4;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cabin',sans-serif;background:#F2F5FA;color:var(--gris1);font-size:13px;}

/* ── TOOLBAR ── */
#toolbar{
  position:sticky;top:0;z-index:200;
  background:var(--rep);padding:9px 18px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 12px rgba(0,20,70,.4);
}
#toolbar h1{font-family:'Libre Baskerville',serif;font-size:14px;font-weight:700;color:#fff;flex:1;}
.tbtn{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28);
  color:#fff;padding:5px 12px;border-radius:4px;
  font-family:'Cabin',sans-serif;font-size:11.5px;font-weight:600;
  cursor:pointer;transition:background .18s;white-space:nowrap;
}
.tbtn:hover{background:rgba(255,255,255,.26);}
.tbtn.primary{background:#0057B8;border-color:#0046A0;}

/* ── ONGLETS ── */
#tabs{
  background:#fff;border-bottom:3px solid var(--rep);
  display:flex;overflow-x:auto;
}
.tab{
  padding:10px 18px;cursor:pointer;font-size:12.5px;font-weight:600;
  border-bottom:3px solid transparent;margin-bottom:-3px;
  white-space:nowrap;color:var(--gris2);transition:all .18s;
}
.tab.active{border-bottom-color:var(--rep);color:var(--rep);}
.tab:hover:not(.active){background:var(--gris4);}

/* ── CONTENU ── */
#content{max-width:1200px;margin:18px auto;padding:0 16px 50px;}

/* ── KPI GLOBAUX ── */
.kpi-global{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;margin-bottom:20px;
}
.kg-card{
  background:#fff;border:1px solid var(--bord);border-radius:8px;
  padding:14px 16px;border-top:4px solid var(--rep2);text-align:center;
  box-shadow:0 2px 6px rgba(0,20,80,.08);
}
.kg-card.rouge{border-top-color:var(--rouge);}
.kg-card.vert{border-top-color:var(--vert);}
.kg-card.orange{border-top-color:var(--orange);}
.kg-val{font-size:24px;font-weight:700;color:var(--rep);line-height:1;margin-bottom:4px;}
.kg-val.rouge{color:var(--rouge);}
.kg-val.vert{color:var(--vert);}
.kg-val.orange{color:var(--orange);}
.kg-lbl{font-size:10.5px;color:var(--gris2);line-height:1.3;}

/* ── TABLE ── */
.twrap{background:#fff;border:1px solid var(--bord);border-radius:8px;overflow:hidden;margin-bottom:18px;box-shadow:0 2px 6px rgba(0,20,80,.07);}
.twrap-title{
  background:var(--rep);color:#fff;
  padding:9px 16px;font-size:12.5px;font-weight:700;
  display:flex;align-items:center;gap:7px;
}
.tscroll{overflow-x:auto;}
.ct{width:100%;border-collapse:collapse;font-size:11.5px;}
.ct th{
  background:var(--rep-pale);color:var(--rep);
  padding:7px 10px;text-align:left;font-weight:700;font-size:11px;
  border-bottom:2px solid var(--bord);white-space:nowrap;
  position:sticky;top:0;
}
.ct td{padding:7px 10px;border-bottom:1px solid var(--bord);white-space:nowrap;vertical-align:middle;}
.ct tr.r-SIEGE{background:#F5F0FF;}
.ct tr.r-DI{background:#EEF5FF;}
.ct tr.r-DR td:first-child{padding-left:26px;}
.ct tr.r-DR{background:#F8FBFF;}
.ct tr.r-SCN{background:#F0FFF5;}
.ct tr:hover td{background:#E2EEFF!important;}
.ct tfoot tr td{background:var(--rep-pale)!important;font-weight:700;border-top:2px solid var(--bord);}
.tr{text-align:right;font-variant-numeric:tabular-nums;}
.tc{text-align:center;}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px;}
.b-SIEGE{background:#3D1F7A;color:#fff;}
.b-DI{background:var(--rep);color:#fff;}
.b-DR{background:#1351A8;color:#fff;}
.b-SCN{background:#1A6B3C;color:#fff;}

/* ── MINI JAUGE ── */
.mbar{height:6px;background:var(--gris4);border-radius:3px;overflow:hidden;margin-top:3px;min-width:50px;}
.mfill{height:100%;border-radius:3px;}
.mf-ok{background:var(--vert);}
.mf-warn{background:var(--orange);}
.mf-danger{background:var(--rouge);}

/* ── COMPARATIF ── */
.vs{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;}
.vs-ok{background:#D4EDDA;color:var(--vert);}
.vs-bad{background:#FADDDD;color:var(--rouge);}

/* ── LOADING ── */
#loading{display:flex;flex-direction:column;align-items:center;padding:60px;gap:12px;color:var(--gris2);}
.spin{width:34px;height:34px;border:3px solid var(--bord);border-top-color:var(--rep);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media print{
  #toolbar,#tabs{display:none;}
  body{background:#fff;}
  #content{margin:0;padding:8px;max-width:100%;}
  .kpi-global{grid-template-columns:repeat(4,1fr);}
  @page{margin:10mm;size:A4 landscape;}
}

    FM:{struct:'Structure',type:'TypeMission',annee:'Annee',mt:'MontantTotal',tr:'PartTransport',hb:'PartHebergement',rp:'PartRepas'},
  }

/* ════════ GRIST — INITIALISATION MULTI-MÉTHODES ════════ */

let _gristReady = false;
let _loadTimer  = null;

function initGrist() {
  if (typeof grist === 'undefined') {
    setTimeout(loadDemo, 500); return;
  }

  _loadTimer = setTimeout(() => {
    if (_gristReady) return;
    const el = document.querySelector('#loading span');
    if (el) {
      el.style.color = '#B52020';
      el.style.whiteSpace = 'pre-line';
      el.textContent = '⏱ Grist ne répond pas.\nVérifiez : Niveau d\'accès = "Accès complet au document"\npuis rechargez (F5)';
    }
    let btn = document.getElementById('btn-conso-demo');
    if (!btn) {
      btn = document.createElement('button');
      btn.id = 'btn-conso-demo';
      btn.textContent = 'Mode démonstration';
      btn.style.cssText = 'margin-top:12px;padding:6px 16px;background:#EEF2F7;border:1px solid #CDD6E4;border-radius:5px;cursor:pointer;font-size:12px;';
      btn.onclick = loadDemo;
      document.getElementById('loading').appendChild(btn);
    }
  }, 15000);

  try { grist.ready({ requiredAccess: 'full' }); } catch(e) {}

  const tryFetch = () => { if (!_gristReady) fetchAllTables(); };

  if (typeof grist.onOptions === 'function') grist.onOptions(tryFetch);
  if (typeof grist.onRecord  === 'function') grist.onRecord(tryFetch);
  setTimeout(() => { if (!_gristReady && typeof grist.docApi !== 'undefined') fetchAllTables(); }, 1000);

  let n = 0;
  const poll = setInterval(() => {
    if (_gristReady || ++n > 20) { clearInterval(poll); return; }
    if (typeof grist.docApi?.fetchTable === 'function') { clearInterval(poll); fetchAllTables(); }
  }, 500);
}

async function fetchAllTables() {
  if (_gristReady) return;
  _gristReady = true;
  clearTimeout(_loadTimer);

  const el = document.querySelector('#loading span');
  if (el) el.textContent = 'Chargement des tables…';

  for (const [k, t] of Object.entries(CFG.tables)) {
    try {
      if (el) el.textContent = 'Chargement : ' + t + '…';
      D[k] = toObjs(await grist.docApi.fetchTable(t));
      console.log('[Grist]', t, ':', D[k].length, 'lignes');
    } catch(e) {
      console.warn('[Grist] Table', t, 'introuvable:', e);
      D[k] = [];
    }
  }
  init();
}

function derefId(v) {
  if (v === null || v === undefined)     return v;
  if (Array.isArray(v) && v[0] === 'r') return v[1];
  if (typeof v === 'object' && 'id' in v) return v.id;
  return v;
}

function toObjs(rec) {
  const ks = Object.keys(rec); if (!ks.length) return [];
  return (rec.id||[]).map((id,i) => {
    const o = {id};
    ks.forEach(k => { if (k !== 'id') o[k] = derefId(rec[k][i]); });
    return o;
  });
}

/* ════════ INIT ════════ */
function init(){
  document.getElementById('loading').style.display='none';
  document.getElementById('tab-content').style.display='block';
  renderTab(curTab);
}
function show(tab,el){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTab(tab);
}
function renderTab(tab){
  const el=document.getElementById('tab-content');
  if(tab==='budget')       el.innerHTML=tabBudget();
  else if(tab==='rh')      el.innerHTML=tabRH();
  else if(tab==='contentieux') el.innerHTML=tabContentieux();
  else if(tab==='immobilier')  el.innerHTML=tabImmobilier();
  else if(tab==='vehicules')   el.innerHTML=tabVehicules();
  else if(tab==='fraisMission') el.innerHTML=tabMissions();
}

/* ════════ ORDRE STRUCTURES ════════ */
function ordered(){
  const s=D.structures||[];
  const out=[];
  s.filter(x=>x.Type==='SIEGE').forEach(x=>out.push(x));
  s.filter(x=>x.Type==='DI').forEach(di=>{
    out.push(di);
    s.filter(r=>r.Type==='DR'&&r.Parent==di.id).forEach(dr=>out.push(dr));
  });
  s.filter(x=>x.Type==='SCN').forEach(x=>out.push(x));
  return out;
}

/* ════════ TAB BUDGET ════════ */
function tabBudget(){
  const c=CFG.c.B, structs=ordered(), bud=D.budget||[];
  const types=['Fonctionnement','Investissement','Intervention'];

  // Totaux globaux toutes structures, tous types
  let totAEn=0,totAEc=0,totCPn=0,totCPc=0;
  bud.forEach(r=>{ totAEn+=r[c.ae_n]||0; totAEc+=r[c.ae_c]||0; totCPn+=r[c.cp_n]||0; totCPc+=r[c.cp_c]||0; });
  const pAE=totAEn?Math.round(totAEc/totAEn*100):0;
  const pCP=totCPn?Math.round(totCPc/totCPn*100):0;

  // Lignes
  const rows=structs.map(s=>{
    const sb=bud.filter(r=>r[c.struct]==s.id);
    if(!sb.length) return `<tr class="r-${s.Type}"><td><span class="badge b-${s.Type}">${s.Type}</span> ${s[CFG.c.S.nom]}</td><td colspan="9" class="tc" style="color:var(--gris3)">—</td></tr>`;
    return types.map((t,ti)=>{
      const r=sb.find(x=>x[c.typeb]===t);
      if(!r) return `<tr class="r-${s.Type}">${ti===0?`<td rowspan="3"><span class="badge b-${s.Type}">${s.Type}</span> ${s[CFG.c.S.nom]}</td>`:''}
        <td style="color:var(--gris3);font-size:11px">${t}</td><td colspan="8" class="tc" style="color:var(--gris3)">—</td></tr>`;
      const aen=r[c.ae_n]||0,aed=r[c.ae_d]||0,aec=r[c.ae_c]||0;
      const cpn=r[c.cp_n]||0,cpd=r[c.cp_d]||0,cpc=r[c.cp_c]||0;
      const pae=aed?Math.round(aec/aed*100):aen?Math.round(aec/aen*100):0;
      const pcp=cpd?Math.round(cpc/cpd*100):cpn?Math.round(cpc/cpn*100):0;
      const ca=pae>95?'mf-danger':pae>80?'mf-warn':'mf-ok';
      const cc=pcp>95?'mf-danger':pcp>80?'mf-warn':'mf-ok';
      return `<tr class="r-${s.Type}">
        ${ti===0?`<td rowspan="3" style="font-weight:600"><span class="badge b-${s.Type}">${s.Type}</span> ${s[CFG.c.S.nom]}</td>`:''}
        <td style="font-size:10.5px;color:var(--gris2);font-weight:600">${t}</td>
        <td class="tr">${fmt(aen)}</td><td class="tr">${fmt(aed)}</td><td class="tr">${fmt(aec)}</td>
        <td class="tc"><div>${pae}%</div><div class="mbar"><div class="mfill ${ca}" style="width:${pae}%"></div></div></td>
        <td class="tr">${fmt(cpn)}</td><td class="tr">${fmt(cpd)}</td><td class="tr">${fmt(cpc)}</td>
        <td class="tc"><div>${pcp}%</div><div class="mbar"><div class="mfill ${cc}" style="width:${pcp}%"></div></div></td>
      </tr>`;
    }).join('');
  }).join('');

  return `
  <div class="kpi-global">
    <div class="kg-card"><div class="kg-val" style="font-size:18px">${fmt(totAEn)} €</div><div class="kg-lbl">AE notifiées (total)</div></div>
    <div class="kg-card vert"><div class="kg-val vert" style="font-size:18px">${fmt(totAEc)} €</div><div class="kg-lbl">AE consommées</div></div>
    <div class="kg-card"><div class="kg-val">${pAE}%</div><div class="kg-lbl">Taux exec. AE global</div></div>
    <div class="kg-card"><div class="kg-val" style="font-size:18px">${fmt(totCPn)} €</div><div class="kg-lbl">CP notifiées (total)</div></div>
    <div class="kg-card vert"><div class="kg-val vert" style="font-size:18px">${fmt(totCPc)} €</div><div class="kg-lbl">CP consommées</div></div>
    <div class="kg-card"><div class="kg-val">${pCP}%</div><div class="kg-lbl">Taux exec. CP global</div></div>
  </div>
  <div class="twrap">
    <div class="twrap-title">💶 Budget par structure — ${new Date().getFullYear()}</div>
    <div class="tscroll">
    <table class="ct">
      <thead><tr>
        <th rowspan="2">Structure</th><th rowspan="2">Type</th>
        <th colspan="4" style="text-align:center;border-left:2px solid var(--bord)">Autorisations d'Engagement (€)</th>
        <th colspan="4" style="text-align:center;border-left:2px solid var(--bord)">Crédits de Paiement (€)</th>
      </tr><tr>
        <th style="border-left:2px solid var(--bord)">Notifiées</th><th>Mises à dispo</th><th>Consommées</th><th>Taux</th>
        <th style="border-left:2px solid var(--bord)">Notifiées</th><th>Mises à dispo</th><th>Consommées</th><th>Taux</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td colspan="2">TOTAL</td>
        <td class="tr">${fmt(totAEn)} €</td><td>—</td><td class="tr">${fmt(totAEc)} €</td><td class="tc">${pAE}%</td>
        <td class="tr">${fmt(totCPn)} €</td><td>—</td><td class="tr">${fmt(totCPc)} €</td><td class="tc">${pCP}%</td>
      </tr></tfoot>
    </table>
    </div>
  </div>`;
}

/* ════════ TAB RH ════════ */
function tabRH(){
  const c=CFG.c.RH, structs=ordered(), rhs=D.rh||[];
  let totR=0,totC=0,totMS=0;
  rhs.forEach(r=>{totR+=r[c.rem]||0;totC+=r[c.cib]||0;totMS+=r[c.ms]||0;});
  const pct=totC?Math.round(totR/totC*100):0;
  const ageMoy=rhs.length?(rhs.reduce((s,r)=>s+(r[c.age]||0),0)/rhs.length).toFixed(1):0;
  const totAbs=rhs.reduce((s,r)=>s+(r[c.abs]||0),0);

  const rows=structs.map(s=>{
    const r=rhs.find(x=>x[c.struct]==s.id);
    if(!r) return `<tr class="r-${s.Type}"><td><span class="badge b-${s.Type}">${s.Type}</span> ${s[CFG.c.S.nom]}</td><td colspan="7" class="tc" style="color:var(--gris3)">—</td></tr>`;
    const rem=r[c.rem]||0,cib=r[c.cib]||0;
    const p=cib?Math.round(rem/cib*100):0;
    const cls=p<90?'mf-warn':'mf-ok';
    return `<tr class="r-${s.Type}">
      <td><span class="badge b-${s.Type}">${s.Type}</span> ${s[CFG.c.S.nom]}</td>
      <td class="tr">${rem}</td><td class="tr">${cib}</td>
      <td class="tc"><div>${p}%</div><div class="mbar"><div class="mfill ${cls}" style="width:${p}%"></div></div></td>
      <td class="tr">${fmt(r[c.ms]||0)} €</td>
      <td class="tr">${(r[c.jf]||0).toFixed(1)} j</td>
      <td class="tr">${r[c.abs]||0} j</td>
      <td class="tr">${(r[c.age]||0).toFixed(1)} ans</td>
    </tr>`;
  }).join('');

  return `
  <div class="kpi-global">
    <div class="kg-card"><div class="kg-val">${totR}</div><div class="kg-lbl">Effectifs rémunérés</div></div>
    <div class="kg-card"><div class="kg-val">${totC}</div><div class="kg-lbl">Effectifs cibles</div></div>
    <div class="kg-card vert"><div class="kg-val vert">${pct}%</div><div class="kg-lbl">Taux couverture</div></div>
    <div class="kg-card"><div class="kg-val" style="font-size:18px">${fmt(totMS)} €</div><div class="kg-lbl">Masse salariale totale</div></div>
    <div class="kg-card orange"><div class="kg-val orange">${totAbs}</div><div class="kg-lbl">Jours absentéisme</div></div>
    <div class="kg-card"><div class="kg-val">${ageMoy}</div><div class="kg-lbl">Âge moyen global</div></div>
  </div>
  <div class="twrap">
    <div class="twrap-title">👥 Situation RH par structure</div>
    <div class="tscroll"><table class="ct">
      <thead><tr><th>Structure</th><th>Eff. rém.</th><th>Eff. cibles</th><th>Couverture</th><th>Masse salariale</th><th>J. form./agent</th><th>Absentéisme</th><th>Âge moyen</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td>TOTAL / MOY.</td><td class="tr">${totR}</td><td class="tr">${totC}</td><td class="tc">${pct}%</td><td class="tr">${fmt(totMS)} €</td><td>—</td><td class="tr">${totAbs} j</td><td class="tr">${ageMoy} ans</td></tr></tfoot>
    </table></div>
  </div>`;
}

/* ════════ TAB CONTENTIEUX ════════ */
function tabContentieux(){
  const c=CFG.c.CT, structs=ordered(), ct=D.contentieux||[];
  const totNb=ct.reduce((s,r)=>s+(r[c.nb]||0),0);
  const totCan=ct.reduce((s,r)=>s+(r[c.cannabis]||0),0);
  const totCoc=ct.reduce((s,r)=>s+(r[c.cocaine] ||0),0);
  const totTab=ct.reduce((s,r)=>s+(r[c.tabac]   ||0),0);

  const rows=structs.map(s=>{
    const r=ct.find(x=>x[c.struct]==s.id);
    if(!r) return `<tr class="r-${s.Type}"><td><span class="badge b-${s.Type}">${s.Type}</span> ${s[CFG.c.S.nom]}</td><td colspan="4" class="tc" style="color:var(--gris3)">—</td></tr>`;
    const nb=r[c.nb]||0;
    const cls=nb>=10?'color:var(--rouge);font-weight:700':nb>=5?'color:var(--orange);font-weight:600':'';
    return `<tr class="r-${s.Type}">
      <td><span class="badge b-${s.Type}">${s.Type}</span> ${s[CFG.c.S.nom]}</td>
      <td class="tc" style="${cls}">${nb}</td>
      <td class="tr">${fmtD(r[c.cannabis]||0)} kg</td>
      <td class="tr">${fmtD(r[c.cocaine] ||0)} kg</td>
      <td class="tr">${fmtD(r[c.tabac]   ||0)} kg</td>
    </tr>`;
  }).join('');

  return `
  <div class="kpi-global">
    <div class="kg-card rouge"><div class="kg-val rouge">${totNb}</div><div class="kg-lbl">Total dossiers</div></div>
    <div class="kg-card"><div class="kg-val" style="font-size:18px">${fmtD(totCan)} kg</div><div class="kg-lbl">Cannabis saisi</div></div>
    <div class="kg-card"><div class="kg-val" style="font-size:18px">${fmtD(totCoc)} kg</div><div class="kg-lbl">Cocaïne saisie</div></div>
    <div class="kg-card"><div class="kg-val" style="font-size:18px">${fmtD(totTab)} kg</div><div class="kg-lbl">Tabac saisi</div></div>
  </div>
  <div class="twrap">
    <div class="twrap-title">⚖️ Contentieux par structure</div>
    <table class="ct">
      <thead><tr><th>Structure</th><th class="tc">Nb dossiers</th><th class="tr">Cannabis (kg)</th><th class="tr">Cocaïne (kg)</th><th class="tr">Tabac (kg)</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td>TOTAL</td><td class="tc">${totNb}</td><td class="tr">${fmtD(totCan)} kg</td><td class="tr">${fmtD(totCoc)} kg</td><td class="tr">${fmtD(totTab)} kg</td></tr></tfoot>
    </table>

}

/* ════════ TAB IMMOBILIER ════════ */
function tabImmobilier(){
  const c=CFG.c.IM, structs=ordered(), im=D.immobilier||[];
  const totM2=im.reduce((s,r)=>s+(r[c.m2]||0),0);
  const bails=im.filter(r=>r[c.occ]==='Bail privé');
  const totLoyer=bails.reduce((s,r)=>s+(r[c.loyer]||0),0);

  const rows=structs.map(s=>{
    const sites=im.filter(x=>x[c.struct]==s.id);
    if(!sites.length) return `<tr class="r-${s.Type}"><td><span class="badge b-${s.Type}">${s.Type}</span> ${s[CFG.c.S.nom]}</td><td colspan="5" class="tc" style="color:var(--gris3)">—</td></tr>`;
    return sites.map((si,i)=>`<tr class="r-${s.Type}">
      ${i===0?`<td rowspan="${sites.length}" style="font-weight:600"><span class="badge b-${s.Type}">${s.Type}</span> ${s[CFG.c.S.nom]}</td>`:''}
      <td>${si[c.site]}</td>
      <td><span class="${si[c.occ]==='Bail privé'?'occ-bail':'occ-pub'}">${si[c.occ]}</span></td>
      <td style="font-size:10.5px;color:var(--gris2)">${si[c.adr]}</td>
      <td class="tr">${fmt(si[c.m2])} m²</td>
      <td class="tr">${fmt(si[c.cout])} €/m²</td>
      <td class="tr">${si[c.occ]==='Bail privé'?fmt(si[c.loyer])+' €':'—'}</td>
    </tr>`).join('');
  }).join('');

  return `
  <div class="kpi-global">
    <div class="kg-card"><div class="kg-val">${im.length}</div><div class="kg-lbl">Sites au total</div></div>
    <div class="kg-card"><div class="kg-val">${im.filter(r=>r[c.occ]==='Domaine public').length}</div><div class="kg-lbl">Domaine public</div></div>
    <div class="kg-card orange"><div class="kg-val orange">${bails.length}</div><div class="kg-lbl">Baux privés</div></div>
    <div class="kg-card vert"><div class="kg-val vert" style="font-size:18px">${fmt(totM2)}</div><div class="kg-lbl">m² totaux</div></div>
    <div class="kg-card"><div class="kg-val" style="font-size:18px">${fmt(totLoyer)} €</div><div class="kg-lbl">Loyers annuels</div></div>
  </div>
  <div class="twrap">
    <div class="twrap-title">🏛️ Patrimoine immobilier</div>
    <div class="tscroll"><table class="ct">
      <thead><tr><th>Structure</th><th>Site</th><th>Type</th><th>Adresse</th><th>m²</th><th>Coût/m²</th><th>Loyer annuel</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

/* ════════ TAB VÉHICULES ════════ */
function tabVehicules(){
  const c=CFG.c.VH, structs=ordered(), vh=D.vehicules||[];
  const totVeh=vh.reduce((s,r)=>s+(r[c.nb]||0),0);
  const avgVet=vh.length?Math.round(vh.reduce((s,r)=>s+(r[c.vet_s]||0),0)/vh.length):0;
  const nat=vh.length?vh[0][c.vet_n]:0;

  const rows=structs.map(s=>{
    const r=vh.find(x=>x[c.struct]==s.id);
    if(!r) return `<tr class="r-${s.Type}"><td><span class="badge b-${s.Type}">${s.Type}</span> ${s[CFG.c.S.nom]}</td><td colspan="5" class="tc" style="color:var(--gris3)">—</td></tr>`;
    const vs=r[c.vet_s]||0,vn=r[c.vet_n]||0;
    const ps=(r[c.vpa_s]||0).toFixed(2),pn=(r[c.vpa_n]||0).toFixed(2);
    const clsV=vs>vn?'mf-danger':vs>vn*0.8?'mf-warn':'mf-ok';
    const vsTag=vs>vn?`<span class="vs vs-bad">▲ +${vs-vn} pts</span>`:`<span class="vs vs-ok">▼ -${vn-vs} pts</span>`;
    const psTag=ps>pn?`<span class="vs vs-bad">▲</span>`:`<span class="vs vs-ok">▼</span>`;
    return `<tr class="r-${s.Type}">
      <td><span class="badge b-${s.Type}">${s.Type}</span> ${s[CFG.c.S.nom]}</td>
      <td class="tr">${r[c.nb]}</td>
      <td class="tc"><div>${vs}% ${vsTag}</div><div class="mbar"><div class="mfill ${clsV}" style="width:${vs}%"></div></div></td>
      <td class="tc" style="color:var(--gris3)">${vn}%</td>
      <td class="tr">${ps} ${psTag}</td>
      <td class="tr" style="color:var(--gris3)">${pn}</td>
    </tr>`;
  }).join('');

  return `
  <div class="kpi-global">
    <div class="kg-card"><div class="kg-val">${totVeh}</div><div class="kg-lbl">Véhicules au total</div></div>
    <div class="kg-card ${avgVet>nat?'rouge':'vert'}"><div class="kg-val ${avgVet>nat?'rouge':'vert'}">${avgVet}%</div><div class="kg-lbl">Vétusté moy. réseau</div></div>
    <div class="kg-card"><div class="kg-val" style="color:var(--gris2)">${nat}%</div><div class="kg-lbl">Référence nationale</div></div>
  </div>
  <div class="twrap">
    <div class="twrap-title">🚗 Parc de véhicules</div>
    <div class="tscroll"><table class="ct">
      <thead><tr>
        <th>Structure</th><th>Nb véh.</th>
        <th>Vétusté structure</th><th>Vétusté nationale</th>
        <th>Véh./agent (structure)</th><th>Véh./agent (national)</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td>TOTAL / MOY.</td><td class="tr">${totVeh}</td><td class="tc">${avgVet}%</td><td class="tc" style="color:var(--gris3)">${nat}%</td><td colspan="2">—</td></tr></tfoot>
    </table></div>
  </div>`;
}

/* ════════ TAB FRAIS DE MISSION ════════ */
function tabMissions(){
  const c=CFG.c.FM, structs=ordered(), fm=D.fraisMission||[];
  const annees=[...new Set(fm.map(r=>r[c.annee]))].sort();
  const types=['Formation','AutresMissions'];
  const tlabels={'Formation':'Formation','AutresMissions':'Autres missions'};

  // KPI : totaux par type sur toutes années
  const totF=fm.filter(r=>r[c.type]==='Formation').reduce((s,r)=>s+(r[c.mt]||0),0);
  const totA=fm.filter(r=>r[c.type]==='AutresMissions').reduce((s,r)=>s+(r[c.mt]||0),0);

  // Tableau : une ligne par structure×type, colonnes = années
  const rows=structs.map(s=>{
    return types.map((t,ti)=>{
      const rowsT=annees.map(a=>{
        const r=fm.find(x=>x[c.struct]==s.id&&x[c.type]===t&&x[c.annee]===a);
        return `<td class="tr">${r?fmt(r[c.mt]||0)+' €':'—'}</td>`;
      }).join('');
      return `<tr class="r-${s.Type}">
        ${ti===0?`<td rowspan="2" style="font-weight:600"><span class="badge b-${s.Type}">${s.Type}</span> ${s[CFG.c.S.nom]}</td>`:''}
        <td style="font-size:10.5px;color:var(--gris2);font-weight:600">${tlabels[t]}</td>
        ${rowsT}
      </tr>`;
    }).join('');
  }).join('');

  // Totaux par année
  const totCols=annees.map(a=>{
    const t=fm.filter(r=>r[c.annee]===a).reduce((s,r)=>s+(r[c.mt]||0),0);
    return `<td class="tr">${fmt(t)} €</td>`;
  }).join('');

  return `
  <div class="kpi-global">
    <div class="kg-card"><div class="kg-val" style="font-size:18px">${fmt(totF+totA)} €</div><div class="kg-lbl">Total frais (${annees[0]}–${annees[annees.length-1]})</div></div>
    <div class="kg-card"><div class="kg-val" style="font-size:18px">${fmt(totF)} €</div><div class="kg-lbl">dont Formation</div></div>
    <div class="kg-card"><div class="kg-val" style="font-size:18px">${fmt(totA)} €</div><div class="kg-lbl">dont Autres missions</div></div>
  </div>
  <div class="twrap">
    <div class="twrap-title">✈️ Frais de mission — évolution sur ${annees.length} ans</div>
    <div class="tscroll"><table class="ct">
      <thead><tr><th>Structure</th><th>Type</th>${annees.map(a=>`<th class="tr">${a}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="2">TOTAL toutes structures</td>${totCols}</tr></tfoot>
    </table></div>
  </div>`;
}

/* ════════ UTILITAIRES ════════ */
function fmt(n){ return n!=null?Number(n).toLocaleString('fr-FR'):'—'; }
function fmtD(n){ return n!=null?Number(n).toLocaleString('fr-FR',{maximumFractionDigits:1}):'—'; }

window.addEventListener('load',initGrist);
