<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche Indicateurs – Widget Grist</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bleu:    #1a3a5c;
  --bleu2:   #2e7db5;
  --bleu3:   #d4e8f5;
  --or:      #c9a84c;
  --gris:    #f4f6f9;
  --gris2:   #e2e8ef;
  --texte:   #1c2733;
  --rouge:   #c0392b;
  --vert:    #1a7a4a;
  --orange:  #d4680a;
  --radius:  6px;
  --shadow:  0 2px 12px rgba(26,58,92,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--gris);
  color: var(--texte);
  font-size: 13px;
  min-height: 100vh;
}

/* ── BARRE SÉLECTEUR ─────────────────────────────── */
#top-bar {
  background: var(--bleu);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  flex-wrap: wrap;
}
#top-bar .logo-zone {
  width: 54px; height: 54px;
  background: white;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
}
#top-bar .logo-zone img { max-width: 100%; max-height: 100%; object-fit: contain; }
#top-bar h1 {
  font-family: 'Libre Baskerville', serif;
  font-size: 15px;
  color: white;
  font-weight: 700;
  letter-spacing: 0.02em;
  flex: 1;
  min-width: 120px;
}
#top-bar h1 span { display: block; font-size: 11px; font-weight: 400; opacity: 0.7; font-style: italic; margin-top: 1px; }

/* Sélecteur ergonomique */
.selector-wrap {
  position: relative;
  min-width: 260px;
  flex: 1;
  max-width: 400px;
}
#search-input {
  width: 100%;
  padding: 8px 36px 8px 12px;
  border-radius: var(--radius);
  border: 1.5px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.12);
  color: white;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  outline: none;
  cursor: pointer;
  transition: background 0.2s, border 0.2s;
}
#search-input::placeholder { color: rgba(255,255,255,0.6); }
#search-input:focus { background: rgba(255,255,255,0.2); border-color: var(--or); }
.selector-arrow {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  color: rgba(255,255,255,0.7); pointer-events: none; font-size: 11px;
}
#dropdown-list {
  display: none;
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: white;
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  max-height: 340px;
  overflow-y: auto;
  z-index: 200;
  border: 1px solid var(--gris2);
}
#dropdown-list.open { display: block; }
.dd-group-label {
  padding: 6px 12px 3px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--bleu2);
  background: var(--gris);
  border-top: 1px solid var(--gris2);
}
.dd-item {
  padding: 8px 12px 8px 20px;
  cursor: pointer;
  transition: background 0.12s;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--gris2);
}
.dd-item:hover { background: var(--bleu3); }
.dd-item.active { background: var(--bleu3); font-weight: 600; color: var(--bleu); }
.dd-item .badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.badge-siege { background: var(--bleu); color: white; }
.badge-dir   { background: var(--bleu2); color: white; }
.badge-scn   { background: var(--or); color: white; }

/* Contrôles droite */
.top-controls { display: flex; gap: 8px; align-items: center; }
.btn-top {
  padding: 7px 13px;
  border-radius: var(--radius);
  border: 1.5px solid rgba(255,255,255,0.35);
  background: transparent;
  color: white;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: background 0.18s, border-color 0.18s;
  white-space: nowrap;
}
.btn-top:hover { background: rgba(255,255,255,0.15); border-color: var(--or); }
.btn-top.primary { background: var(--or); border-color: var(--or); color: var(--bleu); font-weight: 700; }
.btn-top.primary:hover { background: #b8952e; }

/* Filtre année */
#annee-select {
  padding: 7px 10px;
  border-radius: var(--radius);
  border: 1.5px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.12);
  color: white;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 12px;
  cursor: pointer;
  outline: none;
}
#annee-select option { background: var(--bleu); }

/* ── FICHE ───────────────────────────────────────── */
#fiche {
  max-width: 1100px;
  margin: 20px auto;
  padding: 0 16px 40px;
}
#empty-state {
  text-align: center;
  padding: 80px 20px;
  color: #8a9bb0;
}
#empty-state svg { margin-bottom: 16px; opacity: 0.4; }
#empty-state p { font-size: 15px; }

/* En-tête fiche */
.fiche-header {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px 24px;
  margin-bottom: 14px;
  display: flex;
  gap: 20px;
  align-items: flex-start;
  border-left: 5px solid var(--bleu);
}
.fiche-logo {
  width: 90px; height: 110px; flex-shrink: 0;
  border: 1px solid var(--gris2);
  border-radius: 4px;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: var(--gris);
}
.fiche-logo img { max-width: 100%; max-height: 100%; object-fit: contain; }
.fiche-logo-placeholder { font-size: 10px; color: #aaa; text-align: center; padding: 4px; }
.fiche-title-zone { flex: 1; }
.fiche-title-zone h2 {
  font-family: 'Libre Baskerville', serif;
  font-size: 20px;
  color: var(--bleu);
  font-weight: 700;
  margin-bottom: 4px;
}
.fiche-title-zone .fiche-meta {
  display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px;
}
.fiche-meta-item {
  font-size: 11px;
  color: #6b7f92;
  background: var(--gris);
  padding: 3px 8px;
  border-radius: 12px;
  border: 1px solid var(--gris2);
}

/* Zone points d'attention */
.points-attention {
  background: #fffbf0;
  border: 1px solid #f0d98a;
  border-left: 5px solid var(--or);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 14px;
}
.points-attention h3 {
  font-family: 'Libre Baskerville', serif;
  font-size: 13px;
  color: #8a6a00;
  font-weight: 700;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.point-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 7px 0;
  border-bottom: 1px solid #f0e8c0;
}
.point-item:last-child { border-bottom: none; }
.point-prio {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  padding: 2px 6px; border-radius: 10px; flex-shrink: 0; margin-top: 1px;
}
.prio-haute   { background: #fde8e8; color: var(--rouge); }
.prio-moyenne { background: #fef3e2; color: var(--orange); }
.prio-basse   { background: #e8f7ed; color: var(--vert); }
.point-content { flex: 1; }
.point-titre   { font-weight: 600; font-size: 12px; color: var(--texte); }
.point-texte   { font-size: 12px; color: #5a6a7a; margin-top: 2px; line-height: 1.4; }
.point-statut  { font-size: 10px; color: #8a9aaa; margin-top: 3px; }

/* ── BLOCS INDICATEURS ───────────────────────────── */
.bloc {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.bloc:hover { box-shadow: 0 4px 20px rgba(26,58,92,0.13); }
.bloc-header {
  background: var(--bleu);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.bloc-header h3 {
  font-family: 'Libre Baskerville', serif;
  font-size: 13px;
  color: white;
  font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.bloc-header h3 .ico { font-size: 15px; }
.bloc-toggle {
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  transition: transform 0.2s;
}
.bloc-toggle.collapsed { transform: rotate(-90deg); }
.bloc-body {
  padding: 16px 18px;
  transition: max-height 0.3s ease;
}
.bloc-body.hidden { display: none; }

/* Tableau indicateurs */
.ind-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-bottom: 10px;
}
.ind-table th {
  background: var(--gris);
  padding: 6px 10px;
  text-align: left;
  font-weight: 700;
  font-size: 11px;
  color: #4a5a6a;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 2px solid var(--gris2);
}
.ind-table th.right, .ind-table td.right { text-align: right; }
.ind-table td {
  padding: 7px 10px;
  border-bottom: 1px solid var(--gris2);
  color: var(--texte);
  vertical-align: middle;
}
.ind-table tr:last-child td { border-bottom: none; }
.ind-table tr:hover td { background: var(--bleu3); }
.ind-table td.label { font-weight: 600; color: var(--bleu); }
.ind-table td .sub { font-size: 10px; color: #8a9aaa; }

/* Cartes indicateurs inline */
.ind-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}
.ind-card {
  background: var(--gris);
  border-radius: var(--radius);
  padding: 10px 12px;
  border-left: 3px solid var(--bleu2);
  transition: border-color 0.2s;
}
.ind-card.alerte { border-left-color: var(--rouge); background: #fff5f5; }
.ind-card.ok     { border-left-color: var(--vert); background: #f0faf4; }
.ind-card.warn   { border-left-color: var(--orange); background: #fff8f0; }
.ind-card .card-label { font-size: 10px; color: #6a7a8a; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.ind-card .card-val   { font-size: 20px; font-weight: 700; color: var(--bleu); margin: 4px 0 2px; line-height: 1; }
.ind-card .card-val.alerte { color: var(--rouge); }
.ind-card .card-val.ok     { color: var(--vert); }
.ind-card .card-sub   { font-size: 10px; color: #8a9aaa; }

/* Barre de progression budget */
.budget-bar-wrap { margin: 4px 0 12px; }
.budget-bar-label { font-size: 10px; color: #6a7a8a; margin-bottom: 3px; display: flex; justify-content: space-between; }
.budget-bar { height: 8px; background: var(--gris2); border-radius: 4px; overflow: hidden; }
.budget-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
.budget-bar-fill.ok    { background: var(--vert); }
.budget-bar-fill.warn  { background: var(--orange); }
.budget-bar-fill.alert { background: var(--rouge); }

/* sous-onglets (ex: budget par nature) */
.subtabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
.subtab {
  padding: 5px 12px;
  border-radius: 14px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--gris2);
  background: var(--gris);
  color: #5a6a7a;
  transition: all 0.15s;
}
.subtab.active { background: var(--bleu); color: white; border-color: var(--bleu); }
.subtab-panel { display: none; }
.subtab-panel.active { display: block; }

/* Comparatif national */
.comparatif {
  display: flex;
  gap: 6px;
  align-items: center;
  font-size: 11px;
  margin-top: 4px;
}
.comp-arrow { font-size: 14px; }
.comp-text  { color: #6a7a8a; }
.comp-val   { font-weight: 700; }
.comp-val.above { color: var(--rouge); }
.comp-val.below { color: var(--vert); }
.comp-val.equal { color: var(--orange); }

/* DR accordéon dans les blocs */
.dr-toggle-btn {
  font-size: 11px; background: var(--bleu3); color: var(--bleu);
  border: 1px solid var(--bleu2); border-radius: 12px;
  padding: 3px 10px; cursor: pointer; margin-bottom: 10px;
  font-weight: 600; display: inline-flex; align-items: center; gap: 4px;
}
.dr-zone { display: none; margin-top: 8px; }
.dr-zone.open { display: block; }
.dr-subtitle {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--bleu2); margin: 8px 0 4px;
  padding-bottom: 4px; border-bottom: 1px solid var(--gris2);
}

/* Zone commentaire */
.commentaire-zone {
  margin-top: 12px;
  border-top: 1px dashed var(--gris2);
  padding-top: 10px;
}
.commentaire-zone label {
  font-size: 10px; font-weight: 700; color: #8a9aaa;
  text-transform: uppercase; letter-spacing: 0.06em;
  display: block; margin-bottom: 5px;
}
.commentaire-zone .cmt-content {
  font-size: 12px; color: #3a4a5a;
  background: var(--gris);
  border-radius: var(--radius);
  padding: 8px 12px;
  border-left: 3px solid var(--gris2);
  min-height: 36px;
  line-height: 1.5;
  font-style: italic;
}
.cmt-meta { font-size: 10px; color: #aaa; margin-top: 4px; }

/* Section immobilier */
.site-list { display: flex; flex-direction: column; gap: 8px; }
.site-card {
  background: var(--gris);
  border-radius: var(--radius);
  padding: 10px 14px;
  border-left: 3px solid var(--bleu2);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px;
}
.site-card.bail { border-left-color: var(--orange); }
.site-name { font-weight: 700; font-size: 12px; color: var(--bleu); }
.site-addr { font-size: 11px; color: #6a7a8a; }
.site-infos { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
.site-info-item { font-size: 11px; color: #4a5a6a; }
.site-info-item strong { color: var(--bleu); }
.site-badge {
  font-size: 9px; font-weight: 700; padding: 2px 7px;
  border-radius: 10px; align-self: start; white-space: nowrap;
}
.badge-dp { background: #e0f0ff; color: var(--bleu2); }
.badge-bp { background: #fff0e0; color: var(--orange); }

/* Frais mission — graphique simple */
.frais-chart { display: flex; flex-direction: column; gap: 6px; }
.frais-row { display: grid; grid-template-columns: 70px 1fr auto; gap: 8px; align-items: center; }
.frais-year { font-size: 11px; font-weight: 700; color: var(--bleu); }
.frais-bar-wrap { position: relative; }
.frais-bar-track { background: var(--gris2); border-radius: 3px; height: 20px; }
.frais-bar-seg {
  position: absolute; top: 0; height: 100%; border-radius: 3px;
  transition: width 0.4s ease;
}
.frais-bar-track { position: relative; overflow: hidden; display: flex; }
.seg-transport   { background: var(--bleu2); }
.seg-hebergement { background: var(--or); }
.seg-repas       { background: #6db88e; }
.frais-total { font-size: 11px; font-weight: 700; color: var(--texte); white-space: nowrap; }
.frais-legend {
  display: flex; gap: 12px; flex-wrap: wrap;
  margin-bottom: 10px; font-size: 11px;
}
.frais-legend-item { display: flex; align-items: center; gap: 5px; }
.frais-legend-dot { width: 10px; height: 10px; border-radius: 2px; }

/* État vide par bloc */
.bloc-empty { color: #aab; font-size: 12px; font-style: italic; padding: 8px 0; }

/* ── PRINT / EXPORT ──────────────────────────────── */
@media print {
  #top-bar, #export-modal, .dr-toggle-btn { display: none !important; }
  body { background: white; }
  #fiche { max-width: 100%; margin: 0; padding: 0; }
  .bloc { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
  .bloc-body.hidden { display: block !important; }
}

/* ── MODAL EXPORT ────────────────────────────────── */
#export-modal {
  display: none;
  position: fixed; inset: 0; z-index: 500;
  background: rgba(10,20,40,0.55);
  align-items: center; justify-content: center;
}
#export-modal.open { display: flex; }
.modal-box {
  background: white;
  border-radius: 10px;
  width: 520px; max-width: 95vw;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  padding: 28px;
}
.modal-box h2 {
  font-family: 'Libre Baskerville', serif;
  font-size: 17px; color: var(--bleu);
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--gris2);
}
.modal-section { margin-bottom: 18px; }
.modal-section h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #6a7a8a; margin-bottom: 8px; }
.export-check-list { display: flex; flex-direction: column; gap: 7px; }
.export-check {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--gris);
  border-radius: var(--radius);
  border: 1.5px solid var(--gris2);
  cursor: pointer;
  transition: border-color 0.15s;
}
.export-check:hover { border-color: var(--bleu2); }
.export-check input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--bleu); }
.export-check label { font-size: 13px; cursor: pointer; flex: 1; }
.export-options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.export-option {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 12px;
  border-radius: var(--radius);
  border: 1.5px solid var(--gris2);
  background: var(--gris);
  cursor: pointer; font-size: 12px;
}
.export-option input { accent-color: var(--bleu); }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding-top: 14px; border-top: 1px solid var(--gris2); }
.btn-modal {
  padding: 9px 20px;
  border-radius: var(--radius);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid var(--gris2);
  background: var(--gris);
  transition: all 0.15s;
}
.btn-modal.primary { background: var(--bleu); color: white; border-color: var(--bleu); }
.btn-modal.primary:hover { background: #14304f; }
.btn-modal:hover { border-color: var(--bleu2); }

/* Loader */
#loader {
  display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.85);
  z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
}
#loader.show { display: flex; }
.spinner {
  width: 36px; height: 36px;
  border: 4px solid var(--gris2);
  border-top-color: var(--bleu);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- BARRE TOP -->
<div id="top-bar">
  <div class="logo-zone">
    <img id="org-logo" src="" alt="Logo" onerror="this.style.display='none';document.getElementById('logo-ph').style.display='block'">
    <span id="logo-ph" style="display:none;font-size:9px;color:#aaa;text-align:center">Logo<br>180×221</span>
  </div>
  <h1 id="org-name">Indicateurs de Gestion<span id="org-subtitle">Direction Générale</span></h1>

  <div class="selector-wrap" id="selector-wrap">
    <input type="text" id="search-input" placeholder="🔍  Rechercher une structure..." autocomplete="off" readonly>
    <span class="selector-arrow">▼</span>
    <div id="dropdown-list"></div>
  </div>

  <div class="top-controls">
    <select id="annee-select"></select>
    <button class="btn-top" onclick="openExportModal()">⬇ Exporter</button>
    <button class="btn-top" onclick="window.print()">🖨 Imprimer</button>
  </div>
</div>

<!-- FICHE -->
<div id="fiche">
  <div id="empty-state">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="9" y1="21" x2="9" y2="9"/>
    </svg>
    <p>Sélectionnez une structure dans le menu ci-dessus</p>
  </div>
  <div id="fiche-content" style="display:none"></div>
</div>

<!-- MODAL EXPORT -->
<div id="export-modal">
  <div class="modal-box">
    <h2>⬇ Options d'export</h2>
    <div class="modal-section">
      <h4>Blocs à inclure</h4>
      <div class="export-check-list" id="export-blocs">
        <div class="export-check"><input type="checkbox" id="ex-pa" checked><label for="ex-pa">Points d'attention</label></div>

// ═══════════════════════════════════════════════════
function gristReady() {
  if (typeof grist === 'undefined') { loadDemoData(); return; }
  grist.ready({ requiredAccess: 'read table' });
  grist.onRecords(onGristRecords);
  grist.onRecord && grist.onRecord(rec => {
    if (rec && rec.structure_id) selectStructure(rec.structure_id);
  });
}

async function onGristRecords(recs) {
  // Grist envoie la table courante ; on charge toutes les tables via l'API
  try {
    const tables = ['Structures','Contentieux','Budget','RH_Effectifs',
                    'Immobilier_Sites','Vehicules','Frais_Mission',
                    'Points_Attention','Commentaires_Blocs','Parametres'];
    const fetches = await Promise.all(tables.map(t =>
      grist.docApi.fetchTable(t).catch(() => null)
    ));
    const [s,co,bu,rh,im,ve,fr,pa,cm,pr] = fetches;
    if (s) DATA.structures        = tableToRows(s);
    if (co) DATA.contentieux       = tableToRows(co);
    if (bu) DATA.budget            = tableToRows(bu);
    if (rh) DATA.rh                = tableToRows(rh);
    if (im) DATA.immobilier        = tableToRows(im);
    if (ve) DATA.vehicules         = tableToRows(ve);
    if (fr) DATA.frais             = tableToRows(fr);
    if (pa) DATA.pointsAttention   = tableToRows(pa);
    if (cm) DATA.commentaires      = tableToRows(cm);
    if (pr) DATA.parametres        = tableToRows(pr);
    applyParametres();
    buildSelector();
    buildAnneeSelect();
  } catch(e) { loadDemoData(); }
}

function tableToRows(t) {
  if (!t) return [];
  const cols = Object.keys(t);
  const len  = t[cols[0]].length;
  return Array.from({length: len}, (_,i) => {
    const row = {};
    cols.forEach(c => row[c] = t[c][i]);
    return row;
  });
}

function buildSelector() {
  const input = document.getElementById('search-input');
  const list  = document.getElementById('dropdown-list');
  input.readOnly = false;

  // Structures visibles = pas dir_regionale
  const visibles = DATA.structures
    .filter(s => s.actif && s.type !== 'dir_regionale')
    .sort((a,b) => (a.ordre_affichage||99)-(b.ordre_affichage||99));

  function render(filter='') {
    list.innerHTML = '';
    const f = filter.toLowerCase();
    const groupes = [
      {label:'Siège',    types:['siege']},
      {label:'Directions Interrégionales', types:['dir_interregionale']},
      {label:'Services à Compétence Nationale', types:['scn']},
    ];
    groupes.forEach(g => {
      const items = visibles.filter(s => g.types.includes(s.type) && (!f || s.nom.toLowerCase().includes(f) || s.code.toLowerCase().includes(f)));
      if (!items.length) return;
      const lbl = document.createElement('div');
      lbl.className = 'dd-group-label'; lbl.textContent = g.label;
      list.appendChild(lbl);
      items.forEach(s => {
        const d = document.createElement('div');
        d.className = 'dd-item' + (s.id === state.structureId ? ' active' : '');
        d.dataset.id   = s.id;
        d.dataset.name = s.nom;
        const badgeClass = s.type==='siege'?'badge-siege':s.type==='scn'?'badge-scn':'badge-dir';
        d.innerHTML = `<span class="badge ${badgeClass}">${s.code}</span>${s.nom}`;
        d.addEventListener('click', () => {
          selectStructure(s.id);
          input.value = s.nom;
          list.classList.remove('open');
        });
        list.appendChild(d);
      });
    });
    if (!list.children.length) {
      list.innerHTML = '<div style="padding:12px;color:#aaa;font-style:italic;font-size:12px;">Aucun résultat</div>';
    }
  }

  input.addEventListener('focus', () => { render(input.value); list.classList.add('open'); });
  input.addEventListener('input', () => render(input.value));
  document.addEventListener('click', e => {
    if (!document.getElementById('selector-wrap').contains(e.target)) list.classList.remove('open');
  });
  render();
}

function buildAnneeSelect() {
  const sel = document.getElementById('annee-select');
  const annees = [...new Set([...DATA.contentieux,...DATA.budget,...DATA.rh,...DATA.vehicules,...DATA.frais]
    .map(r=>r.annee).filter(Boolean))].sort((a,b)=>b-a);
  if (!annees.length) annees.push(2024);
  sel.innerHTML = annees.map(a=>`<option value="${a}">${a}</option>`).join('');
  sel.value = state.annee;
  sel.addEventListener('change', () => { state.annee = +sel.value; renderFiche(); });
}

// ═══════════════════════════════════════════════════
// SÉLECTION STRUCTURE
// ═══════════════════════════════════════════════════
function selectStructure(id) {
  state.structureId = +id;
  const s = DATA.structures.find(s=>s.id===state.structureId);
  if (s) document.getElementById('search-input').value = s.nom;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('fiche-content').style.display = 'block';
  renderFiche();
}

// ═══════════════════════════════════════════════════
// RENDU PRINCIPAL
// ═══════════════════════════════════════════════════
function renderFiche() {
  if (!state.structureId) return;
  const sid = state.structureId;
  const yr  = state.annee;
  const s   = DATA.structures.find(x=>x.id===sid);
  if (!s) return;
  const drs = DATA.structures.filter(x=>x.direction_interregionale_id===sid);
  const allSids = [sid, ...drs.map(d=>d.id)];
  const html = `
    ${renderHeader(s, yr)}
    ${renderPointsAttention(sid, yr)}
    ${renderContentieux(sid, yr, drs)}
    ${renderBudget(sid, yr, drs)}
    ${renderRH(sid, yr, drs)}
    ${renderImmobilier(sid, yr, drs)}
    ${renderVehicules(sid, yr, drs)}
    ${renderFraisMission(sid, yr, drs)}
  `;
  document.getElementById('fiche-content').innerHTML = html;
  bindBlocToggles();
  bindDRToggles();
  bindSubtabs();
}

function renderHeader(s, yr) {
  const logoUrl = param('logo_url','');
  const logoHtml = logoUrl
    ? `<img src="${logoUrl}" alt="Logo">`
    : `<div class="fiche-logo-placeholder">Logo<br>180×221 px</div>`;
  const typeLbl = {siege:'Siège',dir_interregionale:'Direction Interrégionale',dir_regionale:'Direction Régionale',scn:'Service à Compétence Nationale'}[s.type]||s.type;
  const drs = DATA.structures.filter(x=>x.direction_interregionale_id===s.id);
  return `
  <div class="fiche-header">
    <div class="fiche-logo">${logoHtml}</div>
    <div class="fiche-title-zone">
      <h2>${s.nom}</h2>
      <div class="fiche-meta">
        <span class="fiche-meta-item">📋 ${typeLbl}</span>
        <span class="fiche-meta-item">🏷 ${s.code}</span>
        <span class="fiche-meta-item">📅 Données ${yr}</span>
        ${drs.length ? `<span class="fiche-meta-item">🗂 ${drs.length} direction(s) régionale(s)</span>` : ''}
      </div>
    </div>
  </div>`;
}

// ─── POINTS D'ATTENTION ───────────────────────────
function renderPointsAttention(sid, yr) {
  const pts = DATA.pointsAttention.filter(p=>p.structure_id===sid && p.annee===yr);

    <div class="point-item">

      <div class="point-content">
        <div class="point-titre">${p.titre}</div>

// ─── BUDGET ────────────────────────────────────────
function renderBudget(sid, yr, drs) {
  const lines = DATA.budget.filter(r=>r.structure_id===sid&&r.annee===yr);
  const cmt   = getCommentaire(sid,yr,'budget');
  if (!lines.length) return renderBloc('budget','💶','Budget',`<div class="bloc-empty">Aucune donnée budget pour ${yr}</div>${cmt}`);

  const types = ['fonctionnement','investissement','intervention'];
  const tabsHtml = types.map((t,i)=>`<div class="subtab ${i===0?'active':''}" data-tab="bud-${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`).join('');
  const panelsHtml = types.map((t,i)=>{
    const rows = lines.filter(r=>r.type_credit===t);
    if (!rows.length) return `<div class="subtab-panel ${i===0?'active':''}" id="bud-${t}"><div class="bloc-empty">Pas de données ${t}</div></div>`;
    const totAE_not = sum(rows,'ae_notifiees'), totAE_conso = sum(rows,'ae_consommees');
    const totCP_not = sum(rows,'cp_notifiees'), totCP_conso = sum(rows,'cp_consommees');
    const tauxAE = totAE_not ? totAE_conso/totAE_not : 0;
    const tauxCP = totCP_not ? totCP_conso/totCP_not : 0;
    const barAE = budgetBar(tauxAE,'AE');
    const barCP = budgetBar(tauxCP,'CP');
    const tableRows = rows.map(r=>{
      const tAE = r.ae_notifiees ? r.ae_consommees/r.ae_notifiees : 0;
      return `<tr>
        <td class="label">${r.nature_depense}<br><span class="sub">${r.commentaire||''}</span></td>
        <td class="right">${fmtEur(r.ae_notifiees)}</td>
        <td class="right">${fmtEur(r.ae_mises_a_disposition)}</td>
        <td class="right">${fmtEur(r.ae_consommees)}</td>
        <td class="right" style="color:${tAE>=0.9?'var(--vert)':tAE>=0.7?'var(--orange)':'var(--rouge)'};font-weight:700">${pct(tAE)}</td>
        <td class="right">${fmtEur(r.cp_notifiees)}</td>
        <td class="right">${fmtEur(r.cp_consommees)}</td>
      </tr>`;
    }).join('');
    return `<div class="subtab-panel ${i===0?'active':''}" id="bud-${t}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div>${barAE}</div><div>${barCP}</div>
      </div>
      <table class="ind-table">
        <thead><tr><th>Nature dépense</th><th class="right">AE notif.</th><th class="right">AE dispo.</th><th class="right">AE conso.</th><th class="right">Taux</th><th class="right">CP notif.</th><th class="right">CP conso.</th></tr></thead>
        <tbody>${tableRows}</tbody>
        <tfoot><tr style="background:var(--gris);font-weight:700">
          <td>Total ${t}</td>
          <td class="right">${fmtEur(totAE_not)}</td><td class="right">–</td><td class="right">${fmtEur(totAE_conso)}</td>
          <td class="right" style="color:${tauxAE>=0.9?'var(--vert)':tauxAE>=0.7?'var(--orange)':'var(--rouge)'}">${pct(tauxAE)}</td>
          <td class="right">${fmtEur(totCP_not)}</td><td class="right">${fmtEur(totCP_conso)}</td>
        </tr></tfoot>
      </table>
    </div>`;
  }).join('');
  const drHtml = drs.length ? renderDRSection(drs, yr, 'budget') : '';
  return renderBloc('budget','💶','Budget',`<div class="subtabs">${tabsHtml}</div>${panelsHtml}${drHtml}${cmt}`);
}

function budgetBar(taux, label) {
  const cls = taux>=0.9?'ok':taux>=0.7?'warn':'alert';
  return `<div class="budget-bar-wrap">
    <div class="budget-bar-label"><span>${label} – consommation</span><span>${pct(taux)}</span></div>
    <div class="budget-bar"><div class="budget-bar-fill ${cls}" style="width:${Math.min(100,taux*100)}%"></div></div>
  </div>`;
}

// ─── RH ────────────────────────────────────────────

// ─── IMMOBILIER ────────────────────────────────────
function renderImmobilier(sid, yr, drs) {
  const allSids = [sid, ...drs.map(d=>d.id)];
  const sites = DATA.immobilier.filter(r=>allSids.includes(r.structure_id));
  const cmt   = getCommentaire(sid,yr,'immobilier');
  const anneeRef = +param('annee_reference','2024');
  if (!sites.length) return renderBloc('immobilier','🏢','Immobilier',`<div class="bloc-empty">Aucun site renseigné</div>${cmt}`);

  const dp = sites.filter(s=>s.type_occupation==='domaine_public');
  const bp = sites.filter(s=>s.type_occupation==='bail_prive');
  const totalSurf = sum(sites,'surface_m2');
  const totalLoyer = sum(bp,'loyer_annuel_euros');

  const renderSite = s => {
    const alerte = s.annee_fin_bail && s.annee_fin_bail <= anneeRef+1;
    const str = s.structure_id !== sid ? (DATA.structures.find(x=>x.id===s.structure_id)||{}).nom||'' : '';
    return `<div class="site-card ${s.type_occupation==='bail_prive'?'bail':''}">
      <div>
        <div class="site-name">${s.denomination}${str?` <span style="font-size:10px;color:#8a9aaa">(${str})</span>`:''}</div>
        <div class="site-addr">📍 ${s.adresse}, ${s.code_postal} ${s.ville}</div>
        <div class="site-infos">
          <span class="site-info-item"><strong>${fmt(s.surface_m2)} m²</strong></span>
          ${s.loyer_annuel_euros ? `<span class="site-info-item">Loyer : <strong>${fmtEur(s.loyer_annuel_euros)} €/an</strong></span>` : ''}
          ${s.cout_gestion_m2_euros ? `<span class="site-info-item">Coût/m² : <strong>${s.cout_gestion_m2_euros} €</strong></span>` : ''}
          ${s.annee_fin_bail ? `<span class="site-info-item" style="color:${alerte?'var(--rouge)':'inherit'}">Bail : ${s.annee_debut_bail}–${s.annee_fin_bail}${alerte?' ⚠':''}</span>` : ''}
          ${s.proprietaire ? `<span class="site-info-item">Prop. : ${s.proprietaire}</span>` : ''}
        </div>
        ${s.commentaire?`<div style="font-size:11px;color:#e07030;margin-top:4px;font-style:italic">⚠ ${s.commentaire}</div>`:''}
      </div>
      <span class="site-badge ${s.type_occupation==='domaine_public'?'badge-dp':'badge-bp'}">${s.type_occupation==='domaine_public'?'Dom. public':'Bail privé'}</span>
    </div>`;
  };
  const summary = `<div class="ind-cards" style="margin-bottom:12px">
    <div class="ind-card"><div class="card-label">Sites totaux</div><div class="card-val">${sites.length}</div><div class="card-sub">${dp.length} dom. public · ${bp.length} baux</div></div>
    <div class="ind-card"><div class="card-label">Surface totale</div><div class="card-val">${fmt(totalSurf)}</div><div class="card-sub">m²</div></div>
    ${totalLoyer?`<div class="ind-card warn"><div class="card-label">Loyers annuels</div><div class="card-val">${fmtEur(totalLoyer)}</div><div class="card-sub">€/an (baux privés)</div></div>`:''}
  </div>`;
  const listHtml = `<div class="site-list">${sites.map(renderSite).join('')}</div>`;
  return renderBloc('immobilier','🏢','Immobilier',`${summary}${listHtml}${cmt}`);
}

        <div class="budget-bar-fill ok" style="width:${(d.nb_vehicules_moins_5ans/d.nb_vehicules_total*100).toFixed(1)}%;display:inline-block;border-radius:0"></div>

        <span>🟢 &lt;5 ans : ${d.nb_vehicules_moins_5ans}</span>

  const drHtml = drs.length ? renderDRSection(drs, yr, 'vehicules') : '';

// ─── FRAIS MISSION ────────────────────────────────
function renderFraisMission(sid, yr, drs) {
  const cmt = getCommentaire(sid,yr,'frais_mission');
  const annees = [yr-3,yr-2,yr-1,yr];
  const types = ['formation','autres_missions'];
  const tabsHtml = types.map((t,i)=>`<div class="subtab ${i===0?'active':''}" data-tab="fm-${t}">${t==='formation'?'Formation':'Autres missions'}</div>`).join('');

  const buildPanel = (t,i) => {
    const rows = annees.map(a=>{
      const r = DATA.frais.find(x=>x.structure_id===sid&&x.annee===a&&x.type_mission===t);
      return r || {annee:a,montant_total_euros:0,part_transport_euros:0,part_hebergement_euros:0,part_repas_euros:0};
    });
    const maxMt = Math.max(...rows.map(r=>r.montant_total_euros),1);
    const bars = rows.map(r=>{
      const tot = r.montant_total_euros||0;
      const w = (tot/maxMt*100).toFixed(1);
      const wT = tot?(r.part_transport_euros/tot*100).toFixed(1):'0';
      const wH = tot?(r.part_hebergement_euros/tot*100).toFixed(1):'0';
      const wR = tot?(r.part_repas_euros/tot*100).toFixed(1):'0';
      return `<div class="frais-row">
        <div class="frais-year">${r.annee}</div>
        <div class="frais-bar-wrap">
          <div class="frais-bar-track" style="height:22px;position:relative">
            <div class="seg-transport" style="width:${(+wT/100*w).toFixed(1)}%;height:100%;display:inline-block"></div>
            <div class="seg-hebergement" style="width:${(+wH/100*w).toFixed(1)}%;height:100%;display:inline-block"></div>
            <div class="seg-repas" style="width:${(+wR/100*w).toFixed(1)}%;height:100%;display:inline-block"></div>
          </div>
        </div>
        <div class="frais-total">${fmtEur(tot)} €</div>
      </div>`;
    }).join('');
    return `<div class="subtab-panel ${i===0?'active':''}" id="fm-${t}">
      <div class="frais-legend">
        <div class="frais-legend-item"><div class="frais-legend-dot" style="background:var(--bleu2)"></div>Transport</div>
        <div class="frais-legend-item"><div class="frais-legend-dot" style="background:var(--or)"></div>Hébergement</div>
        <div class="frais-legend-item"><div class="frais-legend-dot" style="background:#6db88e"></div>Repas</div>
      </div>
      <div class="frais-chart">${bars}</div>
    </div>`;
  };
  const panels = types.map((t,i)=>buildPanel(t,i)).join('');
  const drHtml = drs.length ? renderDRSection(drs, yr, 'frais_mission') : '';
  return renderBloc('frais_mission','✈️','Frais de mission',`<div class="subtabs">${tabsHtml}</div>${panels}${drHtml}${cmt}`);
}

// ─── DÉTAIL DR ─────────────────────────────────────
function renderDRSection(drs, yr, bloc) {
  if (!drs.length) return '';
  const id = `dr-${bloc}-${Math.random().toString(36).slice(2)}`;
  const items = drs.map(dr => {
    let content = '';
    if (bloc==='contentieux') {
      const d = DATA.contentieux.find(r=>r.structure_id===dr.id&&r.annee===yr);
      content = d ? `<table class="ind-table"><thead><tr><th>Affaires</th><th>Cannabis kg</th><th>Cocaïne kg</th><th>Tabac kg</th><th>Amendes</th></tr></thead>
        <tbody><tr><td>${fmt(d.nb_affaires_total)}</td><td class="right">${fmtKg(d.kg_cannabis)}</td><td class="right">${fmtKg(d.kg_cocaine)}</td><td class="right">${fmtKg(d.kg_tabac)}</td><td class="right">${fmtEur(d.montant_amendes_euros)}</td></tr></tbody></table>`
        : `<div class="bloc-empty">Pas de données</div>`;
    } else if (bloc==='rh') {
      const d = DATA.rh.find(r=>r.structure_id===dr.id&&r.annee===yr);
      content = d ? `<div class="ind-cards">
        <div class="ind-card"><div class="card-label">ETP rémunérés</div><div class="card-val">${d.effectifs_remuneres_etp.toFixed(1)}</div><div class="card-sub">Cible ${d.effectifs_cibles_etp}</div></div>
        <div class="ind-card"><div class="card-label">Masse sal.</div><div class="card-val">${fmtEur(d.masse_salariale_euros)}</div></div>
        <div class="ind-card"><div class="card-label">Absentéisme</div><div class="card-val">${d.taux_absenteisme_pct.toFixed(1)}%</div></div>
      </div>` : `<div class="bloc-empty">Pas de données</div>`;
    } else if (bloc==='vehicules') {
      const d = DATA.vehicules.find(r=>r.structure_id===dr.id&&r.annee===yr);
      content = d ? `<div class="ind-cards">
        <div class="ind-card"><div class="card-label">Véhicules</div><div class="card-val">${d.nb_vehicules_total}</div></div>
        <div class="ind-card"><div class="card-label">Vétusté</div><div class="card-val">${d.taux_vetusite_pct.toFixed(1)}%</div></div>
        <div class="ind-card"><div class="card-label">Ratio/agent</div><div class="card-val">${d.ratio_vehicules_par_agent.toFixed(3)}</div></div>
      </div>` : `<div class="bloc-empty">Pas de données</div>`;
    } else if (bloc==='budget') {
      const rows = DATA.budget.filter(r=>r.structure_id===dr.id&&r.annee===yr);
      const totAE = sum(rows,'ae_consommees'), totCP = sum(rows,'cp_consommees');
      content = rows.length ? `<table class="ind-table"><thead><tr><th>Type</th><th class="right">AE conso.</th><th class="right">CP conso.</th></tr></thead>
        <tbody>${['fonctionnement','investissement','intervention'].map(t=>{
          const r = rows.filter(x=>x.type_credit===t);
          return r.length?`<tr><td class="label">${t}</td><td class="right">${fmtEur(sum(r,'ae_consommees'))}</td><td class="right">${fmtEur(sum(r,'cp_consommees'))}</td></tr>`:''
        }).join('')}</tbody></table>` : `<div class="bloc-empty">Pas de données</div>`;
    } else if (bloc==='frais_mission') {
      const rows = DATA.frais.filter(r=>r.structure_id===dr.id&&r.annee===yr);
      content = rows.length ? `<table class="ind-table"><thead><tr><th>Type</th><th class="right">Montant</th><th class="right">Transport</th><th class="right">Héberg.</th></tr></thead>
        <tbody>${rows.map(r=>`<tr><td class="label">${r.type_mission}</td><td class="right">${fmtEur(r.montant_total_euros)}</td><td class="right">${fmtEur(r.part_transport_euros)}</td><td class="right">${fmtEur(r.part_hebergement_euros)}</td></tr>`).join('')}</tbody></table>`
        : `<div class="bloc-empty">Pas de données</div>`;
    }
    return `<div style="margin-bottom:10px"><div class="dr-subtitle">${dr.nom} (${dr.code})</div>${content}</div>`;
  }).join('');
  return `
    <button class="dr-toggle-btn" onclick="toggleDR('${id}')">▶ Afficher le détail des directions régionales</button>
    <div class="dr-zone" id="${id}">${items}</div>`;
}

// ─── BLOCS GÉNÉRIQUES ─────────────────────────────
function renderBloc(id, ico, titre, content) {
  return `<div class="bloc" id="bloc-${id}">
    <div class="bloc-header" onclick="toggleBloc('bloc-${id}')">
      <h3><span class="ico">${ico}</span>${titre}</h3>
      <span class="bloc-toggle" id="tog-bloc-${id}">▼</span>
    </div>
    <div class="bloc-body" id="body-bloc-${id}">${content}</div>
  </div>`;
}

function getCommentaire(sid, yr, bloc) {
  const c = DATA.commentaires.find(r=>r.structure_id===sid&&r.annee===yr&&r.bloc===bloc);
  if (!c) return '';
  return `<div class="commentaire-zone">
    <label>💬 Commentaire</label>
    <div class="cmt-content">${c.commentaire}</div>
    <div class="cmt-meta">${c.auteur||''}${c.auteur&&c.date_maj?' · ':''}${c.date_maj||''}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════
function toggleBloc(id) {
  const body = document.getElementById('body-'+id);
  const tog  = document.getElementById('tog-'+id);
  if (!body) return;
  body.classList.toggle('hidden');
  if (tog) tog.classList.toggle('collapsed');
}
function toggleDR(id) {
  const zone = document.getElementById(id);
  if (!zone) return;
  zone.classList.toggle('open');
  const btn = zone.previousElementSibling;
  if (btn) btn.textContent = zone.classList.contains('open')
    ? '▼ Masquer le détail des directions régionales'
    : '▶ Afficher le détail des directions régionales';
}
function bindBlocToggles() {}
function bindDRToggles()  {}
function bindSubtabs() {
  document.querySelectorAll('.subtabs').forEach(wrap => {
    wrap.querySelectorAll('.subtab').forEach(tab => {
      tab.addEventListener('click', () => {
        wrap.querySelectorAll('.subtab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        const panelId = tab.dataset.tab;
        const parent  = wrap.closest('.bloc-body');
        parent.querySelectorAll('.subtab-panel').forEach(p => {
          p.classList.toggle('active', p.id===panelId);
        });
      });
    });
  });
}

// ═══════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════
function openExportModal() {
  // Populate structures select
  const list = document.getElementById('export-select-list');
  const structs = DATA.structures.filter(s=>s.actif&&s.type!=='dir_regionale').sort((a,b)=>a.ordre_affichage-b.ordre_affichage);
  list.innerHTML = structs.map(s=>`<div class="export-check"><input type="checkbox" id="exs-${s.id}" value="${s.id}"><label for="exs-${s.id}">${s.nom}</label></div>`).join('');
  document.querySelectorAll('input[name=exp-scope]').forEach(r=>{
    r.addEventListener('change', ()=>{
      document.getElementById('export-select-list').style.display = r.value==='select'?'block':'none';
    });
  });
  document.getElementById('export-modal').classList.add('open');
}
function closeExportModal() {
  document.getElementById('export-modal').classList.remove('open');
}
async function doExport() {
  const fmt = document.querySelector('input[name=exp-fmt]:checked').value;
  const scope = document.querySelector('input[name=exp-scope]:checked').value;
  const blocs = {
    pa: document.getElementById('ex-pa').checked,
    co: document.getElementById('ex-co').checked,
    bu: document.getElementById('ex-bu').checked,
    rh: document.getElementById('ex-rh').checked,
    im: document.getElementById('ex-im').checked,
    ve: document.getElementById('ex-ve').checked,
    fm: document.getElementById('ex-fm').checked,
    dr: document.getElementById('ex-dr').checked,
  };
  closeExportModal();
  if (fmt==='print') { window.print(); return; }
  if (fmt==='html')  { exportHTML(scope, blocs); return; }
  if (fmt==='pdf')   { exportPDF(scope, blocs); return; }
}

function getExportStructures(scope) {
  if (scope==='current') return [state.structureId];
  if (scope==='all') return DATA.structures.filter(s=>s.actif&&s.type!=='dir_regionale').map(s=>s.id);
  return [...document.querySelectorAll('#export-select-list input:checked')].map(i=>+i.value);
}

function exportHTML(scope, blocs) {
  const ids   = getExportStructures(scope);
  const style = document.querySelector('style').textContent;
  let body = '';
  ids.forEach(sid => {
    const s = DATA.structures.find(x=>x.id===sid); if (!s) return;
    const yr  = state.annee;
    const drs = DATA.structures.filter(x=>x.direction_interregionale_id===sid);
    body += `<div class="fiche" style="margin-bottom:40px;page-break-after:always">`;
    body += renderHeader(s,yr);
    if (blocs.pa) body += renderPointsAttention(sid,yr);
    if (blocs.co) body += renderContentieux(sid,yr,blocs.dr?drs:[]);
    if (blocs.bu) body += renderBudget(sid,yr,blocs.dr?drs:[]);
    if (blocs.rh) body += renderRH(sid,yr,blocs.dr?drs:[]);
    if (blocs.im) body += renderImmobilier(sid,yr,blocs.dr?drs:[]);
    if (blocs.ve) body += renderVehicules(sid,yr,blocs.dr?drs:[]);
    if (blocs.fm) body += renderFraisMission(sid,yr,blocs.dr?drs:[]);
    body += `</div>`;
  });
  const html = `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
    <title>Indicateurs – Export ${state.annee}</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>${style} #top-bar,#export-modal,#loader,.dr-toggle-btn{display:none!important}.bloc-body.hidden{display:block!important}</style>
    </head><body><div style="max-width:1100px;margin:20px auto;padding:0 16px">${body}</div></body></html>`;
  const blob = new Blob([html],{type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `indicateurs_${state.annee}_export.html`;
  a.click();
}

function exportPDF(scope, blocs) {
  // Affiche tous les blocs, déclenche print (navigateur → PDF)
  document.querySelectorAll('.bloc-body.hidden').forEach(b => b.classList.remove('hidden'));
  document.querySelectorAll('.dr-zone').forEach(z => z.classList.add('open'));
  setTimeout(() => window.print(), 300);
}

// ═══════════════════════════════════════════════════
// UTILITAIRES
// ═══════════════════════════════════════════════════
const fmtN = new Intl.NumberFormat('fr-FR');
const fmtE = new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0});
function fmt(v)    { return v!=null ? fmtN.format(v) : '–'; }
function fmtEur(v) { return v!=null ? fmtE.format(v) : '–'; }
function fmtKg(v)  { return v!=null ? fmtN.format(Math.round(v)) : '–'; }
function pct(v)    { return (v*100).toFixed(1)+'%'; }
function sum(arr, key) { return arr.reduce((s,r)=>s+(+r[key]||0),0); }
